name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ---------------------------------------------------------------------------
  # Lint Python and PowerShell scripts
  # ---------------------------------------------------------------------------
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Lint Python scripts (ruff)
        run: ruff check scripts/

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser

      - name: Lint PowerShell scripts (PSScriptAnalyzer)
        shell: pwsh
        run: |
          $files = Get-ChildItem scripts/ -Filter *.ps1 -Recurse
          $files += Get-ChildItem scripts/ -Filter *.psm1 -Recurse
          $errors = @()
          foreach ($f in $files) {
            $results = Invoke-ScriptAnalyzer -Path $f.FullName -Severity Error,Warning
            foreach ($r in $results) {
              Write-Host "$($f.Name):$($r.Line)  [$($r.Severity)] $($r.RuleName) — $($r.Message)"
              if ($r.Severity -eq 'Error') { $errors += $r }
            }
          }
          if ($errors.Count -gt 0) {
            Write-Error "$($errors.Count) PSScriptAnalyzer error(s) found."
            exit 1
          }

  # ---------------------------------------------------------------------------
  # Generate minified scripts and upload as artifact
  # ---------------------------------------------------------------------------
  minify:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.12"

      - name: Generate minified scripts
        run: python scripts/minify.py --outdir dist

      - name: Upload minified scripts
        uses: actions/upload-artifact@v4.6.2
        with:
          name: scripts-minified
          path: dist/
          retention-days: 30

  # ---------------------------------------------------------------------------
  # Compile all Arduino sketches and verify protocol.h sync
  # ---------------------------------------------------------------------------
  build:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Install arduino-cli
        run: |
          mkdir -p "$HOME/bin"
          curl -fsSL https://raw.githubusercontent.com/arduino/arduino-cli/master/install.sh | BINDIR=$HOME/bin sh
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Install cores
        run: |
          arduino-cli config init
          arduino-cli config set library.enable_unsafe_install true
          arduino-cli config add board_manager.additional_urls \
            https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json \
            https://github.com/stm32duino/BoardManagerFiles/raw/main/package_stmicroelectronics_index.json
          arduino-cli core update-index
          arduino-cli core install esp32:esp32
          arduino-cli core install STMicroelectronics:stm32

      - name: Install libraries
        run: |
          arduino-cli lib update-index
          curl -L https://github.com/stm32duino/STM32RTC/archive/refs/heads/main.zip -o STM32RTC.zip
          arduino-cli lib install --zip-path STM32RTC.zip

      - name: Build ESP32 master
        run: |
          arduino-cli compile \
            --fqbn esp32:esp32:esp32 \
            esp32_master

      - name: Build ESP32 flasher
        run: |
          arduino-cli compile \
            --fqbn esp32:esp32:esp32 \
            esp32_flasher

      - name: Build STM32 slave
        run: |
          arduino-cli compile \
            --fqbn STMicroelectronics:stm32:GenF1:pnum=BLUEPILL_F103CB \
            stm32_slave

      - name: Verify protocol.h sync
        run: |
          SLAVE_LINES=$(wc -l < stm32_slave/protocol.h)
          if ! diff <(head -n "$SLAVE_LINES" esp32_master/protocol.h) stm32_slave/protocol.h; then
            echo "ERROR: shared protocol.h content is out of sync!"
            exit 1
          fi
          echo "protocol.h shared content is identical in both sketches."
