name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install arduino-cli
        run: |
          mkdir -p "$HOME/bin"
          curl -fsSL https://raw.githubusercontent.com/arduino/arduino-cli/master/install.sh | BINDIR=$HOME/bin sh
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Install cores
        run: |
          arduino-cli config init
          arduino-cli config set library.enable_unsafe_install true
          arduino-cli config add board_manager.additional_urls \
            https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json \
            https://github.com/stm32duino/BoardManagerFiles/raw/main/package_stmicroelectronics_index.json
          arduino-cli core update-index
          arduino-cli core install esp32:esp32
          arduino-cli core install STMicroelectronics:stm32

      - name: Install libraries
        run: |
          arduino-cli lib update-index
          curl -L https://github.com/stm32duino/STM32RTC/archive/refs/heads/main.zip -o STM32RTC.zip
          arduino-cli lib install --zip-path STM32RTC.zip

      - name: Build ESP32 master
        run: |
          arduino-cli compile \
            --fqbn esp32:esp32:esp32 \
            esp32_master

      - name: Build ESP32 flasher
        run: |
          arduino-cli compile \
            --fqbn esp32:esp32:esp32 \
            esp32_flasher

      - name: Build STM32 slave
        run: |
          arduino-cli compile \
            --fqbn STMicroelectronics:stm32:GenF1:pnum=BLUEPILL_F103C8 \
            stm32_slave

      - name: Verify protocol.h sync
        run: |
          # esp32_master/protocol.h has 5 extra lines at the end (master-only State enum).
          # Compare only the shared portion (all lines present in stm32_slave/protocol.h).
          SLAVE_LINES=$(wc -l < stm32_slave/protocol.h)
          if ! diff <(head -n "$SLAVE_LINES" esp32_master/protocol.h) stm32_slave/protocol.h; then
            echo "ERROR: shared protocol.h content is out of sync!"
            exit 1
          fi
          echo "protocol.h shared content is identical in both sketches."
